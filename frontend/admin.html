<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | KEJA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="../../models/Abstract White Background 4K - Motion Graphics Background Loop - White Video Loop - Free Stock Footage 4K (1080p, h264).mp4" type="video/mp4">
  </video>
  <div class="bg-overlay" aria-hidden="true"></div>

  <header class="topbar glass">
    <div class="container topbar-inner">
      <div class="brand"><strong>KEJA</strong><span>Mtaani</span></div>
      <div class="row-gap">
        <a class="btn btn-secondary" href="./index.html">Homepage</a>
        <button class="btn btn-primary" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding:18px 0 26px;">
    <section class="hero-main reveal show slide-right">
      <h1 style="font-size:2rem;">Admin Control Panel</h1>
      <p id="adminWelcome" class="meta" style="margin-bottom:10px;"></p>
      <p class="meta">Monitor users, hosts, listings, chats, and moderation actions.</p>
    </section>

    <section class="info-grid reveal show slide-up" style="margin-top:12px;">
      <article>
        <h3>Analytics</h3>
        <div id="analytics" class="meta">Loading...</div>
      </article>
      <article>
        <h3>Users</h3>
        <div id="usersCount" class="meta">Loading...</div>
      </article>
      <article>
        <h3>Listings</h3>
        <div id="listingsCount" class="meta">Loading...</div>
      </article>
    </section>

    <section class="hero-main reveal show slide-up" style="margin-top:12px;">
      <h3>Add Listing as Admin</h3>
      <p class="meta" style="margin-bottom:10px;">Choose a host and publish a listing to public housing feed.</p>
      <form id="adminListingForm" class="field" style="gap:8px;">
        <label for="hostId">Host account</label>
        <select id="hostId" required></select>
        <label for="title">Title</label>
        <input id="title" required placeholder="Listing title">
        <label for="location">Location</label>
        <input id="location" required placeholder="Kamulu / Joska / Ngondu">
        <label for="price">Price (KES)</label>
        <input id="price" type="number" min="0" required>
        <label for="rentalType">Rental type</label>
        <select id="rentalType" required>
          <option value="Bedsitter">Bedsitter</option>
          <option value="Single Room">Single Room</option>
          <option value="One Bedroom">One Bedroom</option>
        </select>
        <label for="description">Description</label>
        <input id="description" placeholder="Short description">
        <label for="amenities">Amenities (comma separated)</label>
        <input id="amenities" placeholder="Wi-Fi, Water, Security">
        <label for="images">Image URLs (comma separated)</label>
        <input id="images" placeholder="https://...jpg, https://...jpg">
        <button class="btn btn-primary" type="submit">Publish Listing</button>
      </form>
      <p id="listingFormMsg" class="meta" style="margin-top:8px;"></p>
    </section>
  </main>

  <script src="./auth.js"></script>
  <script>
    const session = requireRole(["admin"]);
    const welcome = document.getElementById("adminWelcome");
    const analyticsNode = document.getElementById("analytics");
    const usersNode = document.getElementById("usersCount");
    const listingsNode = document.getElementById("listingsCount");
    const hostSelect = document.getElementById("hostId");
    const listingForm = document.getElementById("adminListingForm");
    const listingFormMsg = document.getElementById("listingFormMsg");

    function parseCommaList(value) {
      return value
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);
    }

    if (session) {
      welcome.textContent = `Signed in as ${session.user.fullName} (${session.user.email})`;

      Promise.all([
        fetch(`${API_BASE_URL}/admin/analytics`, { headers: { Authorization: `Bearer ${session.token}` } }).then((r) => r.json()),
        fetch(`${API_BASE_URL}/admin/users`, { headers: { Authorization: `Bearer ${session.token}` } }).then((r) => r.json()),
        fetch(`${API_BASE_URL}/admin/listings`, { headers: { Authorization: `Bearer ${session.token}` } }).then((r) => r.json())
      ])
        .then(([analytics, users, listings]) => {
          analyticsNode.textContent = `Users: ${analytics.users}, Hosts: ${analytics.hosts}, Chats: ${analytics.chats}`;
          usersNode.textContent = `${users.length} accounts total`;
          listingsNode.textContent = `${listings.length} listings total`;
          const hosts = users.filter((user) => user.role === "host" && user.status === "active");
          hostSelect.innerHTML = hosts
            .map((host) => `<option value="${host.id}">${host.full_name} (${host.email})</option>`)
            .join("");
        })
        .catch(() => {
          analyticsNode.textContent = "Could not load analytics.";
          usersNode.textContent = "Could not load user list.";
          listingsNode.textContent = "Could not load listings.";
        });
    }

    listingForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      listingFormMsg.textContent = "";
      const payload = {
        hostId: Number(document.getElementById("hostId").value),
        title: document.getElementById("title").value.trim(),
        location: document.getElementById("location").value.trim(),
        price: Number(document.getElementById("price").value),
        rentalType: document.getElementById("rentalType").value,
        description: document.getElementById("description").value.trim(),
        amenities: parseCommaList(document.getElementById("amenities").value),
        images: parseCommaList(document.getElementById("images").value)
      };
      try {
        const response = await fetch(`${API_BASE_URL}/listings`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.token}`
          },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Could not add listing");
        listingFormMsg.textContent = "Listing published successfully.";
        listingForm.reset();
      } catch (err) {
        listingFormMsg.textContent = err.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", function () {
      clearSession();
      window.location.href = "./login.html";
    });
  </script>
</body>
</html>
