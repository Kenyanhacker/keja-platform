<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEJA Login | Host & Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="../../models/Abstract White Background 4K - Motion Graphics Background Loop - White Video Loop - Free Stock Footage 4K (1080p, h264).mp4" type="video/mp4">
  </video>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="container" style="min-height:100vh; display:grid; place-items:center;">
    <section class="hero-main reveal show slide-up" style="max-width:460px; width:100%;">
      <div class="brand" style="margin-bottom:12px;">
        <strong>KEJA</strong>
        <span>Mtaani</span>
      </div>
      <h1 style="font-size:2rem;">Host & Admin Login</h1>
      <p style="margin:8px 0 14px;">Use one login page. Your role decides your dashboard access.</p>

      <form id="loginForm" class="field" style="gap:10px;">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="admin@keja.co.ke" required>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required>
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
      <p id="loginError" style="color:#b91c1c; margin-top:10px;"></p>
      <hr style="margin:14px 0; border:none; border-top:1px solid rgba(0,0,0,0.12);">
      <h3 style="margin-bottom:8px;">Create Host Account</h3>
      <form id="hostRegisterForm" class="field" style="gap:8px;">
        <label for="regName">Full name</label>
        <input id="regName" placeholder="e.g. John Mwangi" required>
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" placeholder="host@email.com" required>
        <label for="regPassword">Password</label>
        <input id="regPassword" type="password" placeholder="Create password" required>
        <button class="btn btn-secondary" type="submit">Create Host Account</button>
      </form>
      <p id="registerMsg" style="color:#1e3a8a; margin-top:8px;"></p>
      <div class="row-gap" style="margin-top:12px;">
        <a class="btn btn-secondary" href="./index.html">Back to homepage</a>
      </div>
    </section>
  </main>

  <script src="./auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const registerForm = document.getElementById("hostRegisterForm");
    const registerMsg = document.getElementById("registerMsg");

    const existing = getSession();
    if (existing && existing.user) {
      if (existing.user.role === "admin") window.location.href = "./admin.html";
      if (existing.user.role === "host") window.location.href = "./host.html";
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      errorEl.textContent = "";
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      try {
        const data = await login(email, password);
        if (data.user.role === "admin") {
          window.location.href = "./admin.html";
          return;
        }
        if (data.user.role === "host") {
          window.location.href = "./host.html";
          return;
        }
        window.location.href = "./index.html";
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      registerMsg.textContent = "";
      const fullName = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim().toLowerCase();
      const password = document.getElementById("regPassword").value;
      try {
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fullName, email, password, role: "host" })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Could not create account");
        registerMsg.textContent = "Host account created. You can now login.";
        registerForm.reset();
      } catch (err) {
        registerMsg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
