<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEJA Login | Host & Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="../../models/Abstract White Background 4K - Motion Graphics Background Loop - White Video Loop - Free Stock Footage 4K (1080p, h264).mp4" type="video/mp4">
  </video>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="container" style="min-height:100vh; display:grid; place-items:center;">
    <section class="hero-main reveal show slide-up" style="max-width:460px; width:100%;">
      <div class="brand" style="margin-bottom:12px;">
        <strong>KEJA</strong>
        <span>Mtaani</span>
      </div>
      <h1 style="font-size:2rem;">Host & Admin Login</h1>
      <p style="margin:8px 0 14px;">Use one login page. Your role decides your dashboard access.</p>

      <form id="loginForm" class="field" style="gap:10px;">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="admin@keja.co.ke" required>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required>
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
      <p id="loginError" style="color:#b91c1c; margin-top:10px;"></p>
      <div class="row-gap" style="margin-top:12px;">
        <a class="btn btn-secondary" href="./index.html">Back to homepage</a>
      </div>
    </section>
  </main>

  <script src="./auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");

    const existing = getSession();
    if (existing && existing.user) {
      if (existing.user.role === "admin") window.location.href = "./admin.html";
      if (existing.user.role === "host") window.location.href = "./host.html";
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      errorEl.textContent = "";
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      try {
        const data = await login(email, password);
        if (data.user.role === "admin") {
          window.location.href = "./admin.html";
          return;
        }
        if (data.user.role === "host") {
          window.location.href = "./host.html";
          return;
        }
        window.location.href = "./index.html";
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
